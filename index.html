<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NasDatte — Générateur de Scripts</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #181818;
  --border: #242424;
  --accent: #f5a623;
  --accent2: #e84d3d;
  --text: #f0ede8;
  --muted: #444;
  --muted2: #777;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

header{border-bottom:1px solid var(--border);padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,10,0.96);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:'Bebas Neue',cursive;font-size:2rem;letter-spacing:.08em;color:var(--accent)}
.logo span{color:var(--text)}
.htag{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--muted2);letter-spacing:.15em;text-transform:uppercase;border:1px solid var(--border);padding:4px 10px;border-radius:3px}

.hero{padding:3.5rem 2rem 1.5rem;max-width:960px;margin:0 auto}
.hero h1{font-family:'Bebas Neue',cursive;font-size:clamp(2.8rem,8vw,5.5rem);line-height:.95;letter-spacing:.02em;margin-bottom:.8rem}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{font-size:.85rem;color:var(--muted2);max-width:480px;line-height:1.65;font-family:'Space Mono',monospace}

.main{max-width:960px;margin:0 auto;padding:0 2rem 4rem;display:grid;grid-template-columns:290px 1fr;gap:1.25rem;align-items:start}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:1rem}
.ph{padding:.85rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ptitle{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted2)}
.plink{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--accent);cursor:pointer;letter-spacing:.08em}
.pb{padding:1.1rem}

label{display:block;font-size:.68rem;font-family:'Space Mono',monospace;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;margin-top:12px}
label:first-child{margin-top:0}

select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:5px;font-family:'Inter',sans-serif;font-size:.82rem;padding:7px 9px;appearance:none;cursor:pointer;transition:border-color .2s}
select:hover,select:focus{border-color:var(--accent);outline:none}

input[type=range]{width:100%;accent-color:var(--accent);padding:3px 0}
.rrow{display:flex;align-items:center;gap:8px}
.rval{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--accent);min-width:16px;text-align:right}

.cbgrid{display:flex;flex-direction:column;gap:5px;max-height:340px;overflow-y:auto;padding-right:2px}
.cbgrid::-webkit-scrollbar{width:3px}
.cbgrid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.cbi{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 8px;border-radius:5px;border:1px solid transparent;transition:all .15s;font-size:.8rem}
.cbi:hover{background:var(--surface2);border-color:var(--border)}
.cbi.sel{background:rgba(245,166,35,.07);border-color:rgba(245,166,35,.25)}
.cbi input{display:none}
.dot{width:13px;height:13px;border:1.5px solid var(--muted);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cbi.sel .dot{background:var(--accent);border-color:var(--accent)}
.dot::after{content:'✓';font-size:8px;color:#000;display:none}
.cbi.sel .dot::after{display:block}
.cbn{font-weight:500;color:var(--text);font-size:.8rem}
.cbs{font-size:.68rem;color:var(--muted2);margin-top:1px}

.btn-gen{width:100%;padding:13px;background:var(--accent);color:#000;font-family:'Bebas Neue',cursive;font-size:1.25rem;letter-spacing:.12em;border:none;border-radius:6px;cursor:pointer;transition:all .2s;margin-top:.25rem}
.btn-gen:hover{background:#ffc04d;transform:translateY(-1px)}
.btn-gen:active{transform:scale(.98)}
.btn-gen.loading{pointer-events:none;background:#222;color:var(--muted2)}

.out{display:flex;flex-direction:column;gap:1rem}

.scene-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;animation:fs .3s ease both}
@keyframes fs{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.sch{padding:.7rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2)}
.snum{font-family:'Bebas Neue',cursive;font-size:1.05rem;color:var(--accent);letter-spacing:.05em;min-width:26px}
.sloc{font-size:.7rem;color:var(--muted2);font-family:'Space Mono',monospace}
.stens{margin-left:auto;font-size:.65rem;background:rgba(232,77,61,.1);color:#e84d3d;border:1px solid rgba(232,77,61,.2);padding:2px 8px;border-radius:20px;font-family:'Space Mono',monospace}

.scb{padding:1.1rem;display:flex;flex-direction:column;gap:.9rem}

.snap-block{background:rgba(245,166,35,.05);border-left:3px solid var(--accent);padding:9px 13px;border-radius:0 6px 6px 0;font-size:.83rem;line-height:1.65;color:#d4b896;font-style:italic}
.snap-lbl{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}

.blk{display:flex;flex-direction:column;gap:5px}
.blbl{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
.blbl::after{content:'';flex:1;height:1px;background:var(--border)}

.ptxt{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:9px 11px;font-size:.75rem;line-height:1.75;color:#ccc;font-family:'Space Mono',monospace;white-space:pre-wrap;word-break:break-word}
.ctx{font-size:.83rem;line-height:1.65;color:var(--muted2)}

.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{font-size:.65rem;padding:2px 7px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--muted2);font-family:'Space Mono',monospace}

.empty{background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:3.5rem 2rem;text-align:center;color:var(--muted)}
.empty-icon{font-size:2.5rem;display:block;margin-bottom:.8rem;filter:grayscale(1)}
.empty p{font-family:'Space Mono',monospace;font-size:.75rem;line-height:1.7}

.toprow{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.outtitle{font-family:'Bebas Neue',cursive;font-size:1.4rem;letter-spacing:.05em;color:var(--accent)}
.copybtn{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;background:transparent;color:var(--muted2);border:1px solid var(--border);padding:5px 11px;border-radius:4px;cursor:pointer;transition:all .2s}
.copybtn:hover{color:var(--accent);border-color:var(--accent)}
.copybtn.ok{color:#4caf50;border-color:#4caf50}

.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{font-size:.68rem;padding:2px 8px;border-radius:20px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.2);color:var(--accent);font-family:'Space Mono',monospace}

.story-header{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.1rem 1.25rem}

@media(max-width:700px){.main{grid-template-columns:1fr}.hero{padding:2rem 1rem 1rem}.main{padding:0 1rem 3rem}}
</style>
</head>
<body>

<header>
  <div class="logo">Nas<span>Datte</span></div>
  <div class="htag">Script Generator v1.0</div>
</header>

<div class="hero">
  <h1>Génère tes<br><em>scripts</em><br>quartier</h1>

<div class="main">

            <option value="dos">Quelqu'un parle dans le dos</option>
            <option value="thune">Quelqu'un prend plus que sa part</option>

            <option value="change_thune">Il a changé depuis qu'il gagne</option>

            <option value="confrontation">Confrontation de quartier</option>
            <option value="voisin">Voisin qui fait des histoires</option>
          </optgroup>
          <optgroup label="Drama Snap">
            <option value="live_mal">Live qui tourne mal</option>
            <option value="film_secret">Quelqu'un filme en secret</option>
            <option value="rumeur">Rumeur qui part en vrille</option>
          </optgroup>
        </select>

        <label>Lieu principal</label>
        <select id="lieu">
          <option value="random">🎲 Aléatoire</option>
          <option value="appart">Appart HLM — salon</option>
          <option value="hall">Hall d'immeuble</option>
          <option value="rue">Rue du quartier</option>
          <option value="balcon">Balcon la nuit</option>
          <option value="cuisine">Cuisine de l'appart</option>
          <option value="voiture">Dans la voiture</option>
          <option value="parc">Parc du quartier</option>
          <option value="kebab">Devant le kebab</option>
          <option value="chambre">Chambre</option>
        </select>

        <label>Ton</label>
        <select id="ton">
          <option value="random">🎲 Aléatoire</option>
          <option value="drama">Drama pur — tendu et émotionnel</option>
          <option value="humour">Dark humour — drôle mais cash</option>
          <option value="trash">Trash — sans filtre</option>
          <option value="melan">Mélancolique — beau et triste</option>
          <option value="chaud">Chaud — confrontation directe</option>
        </select>

        <label>Scènes — <span id="nbval">6</span></label>
        <div class="rrow">
          <input type="range" id="nbscenes" min="4" max="12" value="6"
            oninput="document.getElementById('nbval').textContent=this.value">
          <span class="rval" id="nbval2"></span>
        </div>

      </div>
    </div>

    <div class="panel">
      <div class="ph">
        <span class="ptitle">Casting</span>
        <span class="plink" onclick="toggleAll(true)">tout</span>
      </div>
      <div class="pb">
        <div class="cbgrid" id="perso-list"></div>
      </div>
    </div>

    <button class="btn-gen" id="btngen" onclick="generateScript()">⚡ GÉNÉRER LE SCRIPT</button>
  </div>

  <div class="out" id="output">
    <div class="empty">
      <span class="empty-icon">🍑</span>
      <p>Configure ton histoire<br>et clique sur Générer<br><br>// chaque script est unique</p>
    </div>
  </div>

</div>

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function getRandom(obj){
  const keys=Object.keys(obj);
  return keys[Math.floor(Math.random()*keys.length)];

function getVal(id){
  const el=document.getElementById(id);

function getPersos(){
  return PERSOS.filter(p=>{

function getImgPrompt(persos,lieu,prog){
  const main=persos.filter(p=>!p.always).slice(0,3);
  const nd=persos.find(p=>p.always);
  const lieuStr=LIEUX_PROMPTS[lieu]||LIEUX_PROMPTS['appart'];

  let s=lieuStr+'. ';
  main.forEach(p=>{
    s+=`${p.nom.toUpperCase()} — anthropomorphic ${p.fruit}, ${p.desc}. `;
  });
  if(nd){
    s+=`NASDATTE — ${nd.desc}, filming secretly with his phone from the background or a corner, eyes wide with disbelief and amusement. `;
  }
  if(prog<.3) s+='Calm surface, tension just beginning, warm ambient light. ';
  else if(prog<.6) s+='Tension rising, uncomfortable body language, more pronounced shadows. ';
  else if(prog<.85) s+='Peak dramatic tension, raw emotion on faces, hard contrast lighting. ';
  else s+='Aftermath. Emotional exhaustion. Empty silence. Cold cinematic night light. ';
  s+='Highly detailed cinematic 3D cartoon animated movie quality, Pixar-like expressiveness, rich textures, dramatic lighting, expressive faces, clean composition, clear body language, stylized but believable proportions, vertical 9:16.';
  return s;
}

function getVidPrompt(persos,lieu,dialogue){
  const main=persos.filter(p=>!p.always).slice(0,3);
  const nd=persos.find(p=>p.always);
  const lieuStr=LIEUX_PROMPTS[lieu]||LIEUX_PROMPTS['appart'];

  let s='Cinematic 3D cartoon style, vertical 9:16, dialogue in French verlan and argot, no background music, dialogue focused scene, ambient room tone only. ';
  s+=lieuStr+'. ';
  main.forEach(p=>{s+=`${p.nom.toUpperCase()} is an anthropomorphic ${p.fruit}: ${p.desc}. `;});
  if(nd) s+=`NASDATTE is an anthropomorphic ${nd.fruit}: ${nd.desc}. `;

  const p1=main[0];const p2=main[1];
  if(p1&&p2&&dialogue){
    s+=`ONLY ${p1.nom} and ${p2.nom} speak in this scene. All other characters remain completely silent. `;
    s+=`${p1.nom} ${dialogue[0]} in French: "${dialogue[1]}". `;
    s+=`${p2.nom} ${dialogue[2]} in French: "${dialogue[3]}". `;
  } else if(p1&&dialogue){
    s+=`ONLY ${p1.nom} speaks in this scene. All other characters remain completely silent. `;
    s+=`${p1.nom} ${dialogue[0]} in French: "${dialogue[1]}". `;
  }
  const cams=['Camera holds still, slow push in as tension builds.','Slow zoom into the character\'s face revealing the micro-expression.','Camera pans slowly from one character to the other.','Static wide shot showing the physical distance between characters.','Low angle making the speaking character feel imposing.'];
  s+=pick(cams);
  return s;
}

async function generateScript(){
  const btn=document.getElementById('btngen');
  btn.textContent='⏳ GÉNÉRATION...';
  btn.classList.add('loading');
  await new Promise(r=>setTimeout(r,200));

  const themeKey=getVal('theme')||getRandom(THEMES_DATA);
  const lieuKey=getVal('lieu')||pick(Object.keys(LIEUX_PROMPTS));
  const tonKey=getVal('ton')||pick(['drama','humour','trash','melan','chaud']);
  const nb=parseInt(document.getElementById('nbscenes').value);

  const thData=THEMES_DATA[themeKey]||THEMES_DATA['kiff_interdit'];
  const tnData=TONS_DATA[tonKey]||TONS_DATA['drama'];
  const selectedP=getPersos();
  const mainP=selectedP.filter(p=>!p.always);

  const out=document.getElementById('output');
  out.innerHTML='';

  // Header
  const hd=document.createElement('div');
  hd.className='story-header';
  const p1n=mainP[0]?.nom||'...';
  const p2n=mainP[1]?.nom||'...';
  hd.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:.05em;color:var(--accent)">${thData.label}</div>
      <button class="copybtn" onclick="copyAll(this)">Copier tout</button>
    </div>
    <div class="tags">
      ${(thData.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
      <span class="tag">📍 ${lieuKey}</span>
      <span class="tag">🎭 ${tnData.label}</span>
      <span class="tag">${nb} scènes</span>
    </div>
    <div style="font-size:.75rem;color:var(--muted2);font-family:'Space Mono',monospace;line-height:1.6;margin-top:8px">${tnData.style}</div>
    <div class="chips" style="margin-top:10px">${selectedP.map(p=>`<span class="chip">${p.emoji} ${p.nom}</span>`).join('')}</div>
  `;
  out.appendChild(hd);

  const tensionArc=['intro','setup','build','tension','peak','reveal','fallout','aftermath','silence','fin'];

  for(let i=1;i<=nb;i++){
    await new Promise(r=>setTimeout(r,60));
    const prog=i/nb;
    const tIdx=Math.min(Math.round(prog*(tensionArc.length-1)),tensionArc.length-1);

    // Contexte
    let ctxArr;
    if(prog<=.2) ctxArr=CONTEXTES_PAR_PROG[0];
    else if(prog<=.5) ctxArr=CONTEXTES_PAR_PROG[1];
    else if(prog<=.75) ctxArr=CONTEXTES_PAR_PROG[2];
    else ctxArr=CONTEXTES_PAR_PROG[3];
    const ctx=pick(ctxArr)(mainP,lieuKey,themeKey);

    // Snap
    const snap=pick(SNAP_VOIX)(p1n,p2n);

    // Dialogue
    const dlgFn=pick(DIALOGUES);
    const dlg=dlgFn(p1n,p2n);

    // Prompts
    const imgP=getImgPrompt(selectedP,lieuKey,prog);
    const vidP=getVidPrompt(selectedP,lieuKey,dlg);

    const card=document.createElement('div');
    card.className='scene-card';
    card.style.animationDelay=`${(i-1)*.04}s`;
    card.innerHTML=`
      <div class="sch">
        <span class="snum">SCÈNE ${i}</span>
        <span class="sloc">// ${lieuKey.replace(/_/g,' ')}</span>
        <span class="stens">${tensionArc[tIdx]}</span>
      </div>
      <div class="scb">
        <div class="blk">
          <div class="blbl">Contexte</div>
          <div class="ctx">${ctx}</div>
        </div>
        <div class="snap-block">
          <div class="snap-lbl">📱 NasDatte — Snap live</div>
          "${snap}"
        </div>
        <div class="blk">
          <div class="blbl">Prompt image</div>
          <div class="ptxt">${imgP}</div>
        </div>
        <div class="blk">
          <div class="blbl">Prompt vidéo</div>
          <div class="ptxt">${vidP}</div>
        </div>
      </div>
    `;
    out.appendChild(card);
  }

  btn.textContent='⚡ GÉNÉRER LE SCRIPT';
  btn.classList.remove('loading');
}

function copyAll(btn){
  const cards=document.querySelectorAll('.scene-card');
  let txt='';
  cards.forEach((c,i)=>{
    const ctx=c.querySelector('.ctx')?.textContent||'';
    const snap=c.querySelector('.snap-block')?.textContent?.replace('📱 NasDatte — Snap live','').trim()||'';
    const pts=c.querySelectorAll('.ptxt');
    txt+=`\n\n=== SCÈNE ${i+1} ===\n\nCONTEXTE:\n${ctx}\n\nSNAP NASDATTE:\n${snap}\n\nPROMPT IMAGE:\n${pts[0]?.textContent||''}\n\nPROMPT VIDÉO:\n${pts[1]?.textContent||''}`;
  });
  navigator.clipboard.writeText(txt).then(()=>{
    if(btn){btn.textContent='✓ Copié';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copier tout';btn.classList.remove('ok')},2000);}
  });
}

function toggleAll(state){
  document.querySelectorAll('#perso-list .cbi').forEach(item=>{
    const cb=item.querySelector('input');
    if(cb){cb.checked=state;item.classList.toggle('sel',state);}
  });
}

function initPersos(){
  const list=document.getElementById('perso-list');
  PERSOS.forEach(p=>{
    if(p.always)return;
    const lbl=document.createElement('label');
    lbl.className='cbi sel';
    lbl.innerHTML=`
      <input type="checkbox" id="cb_${p.id}" checked
        onchange="this.closest('.cbi').classList.toggle('sel',this.checked)">
      <div class="dot"></div>
      <span style="font-size:1rem">${p.emoji}</span>
      <div>
        <div class="cbn">${p.nom}</div>
        <div class="cbs">${p.fruit} — ${p.ref}</div>
      </div>
    `;
    list.appendChild(lbl);
  });
}

initPersos();
